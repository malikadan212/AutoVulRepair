{% extends 'layout.html' %}

{% block title %}Start Scan{% endblock %}

{% block content %}
  <h2>Start a new scan</h2>
  <form method="post" action="{{ url_for('scan') }}" enctype="multipart/form-data">
    <div class="mb-3">
      <label for="repo_url" class="form-label">GitHub Repository URL</label>
      <input type="url" class="form-control" id="repo_url" name="repo_url" placeholder="https://github.com/owner/repo">
    </div>
    <div class="mb-3">
      <label for="zip_file" class="form-label">Or upload ZIP</label>
      <input class="form-control" type="file" id="zip_file" name="zip_file" accept=".zip">
    </div>
    
    <!-- Static Analysis Tool Selection -->
    <div class="card mb-3">
      <div class="card-header">
        <h6 class="mb-0">Choose Analysis Engine</h6>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-md-6">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="analysis_tool" id="cppcheck_auth" value="cppcheck" checked>
              <label class="form-check-label" for="cppcheck_auth">
                <strong>Cppcheck</strong> - Fast Analysis
                <br><small class="text-muted">Lightweight C/C++ analyzer for quick vulnerability detection with minimal resource usage</small>
              </label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="analysis_tool" id="codeql_auth" value="codeql">
              <label class="form-check-label" for="codeql_auth">
                <strong>CodeQL</strong> - Deep Analysis
                <br><small class="text-muted">Advanced semantic analysis engine for comprehensive security vulnerability discovery</small>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <button type="submit" class="btn btn-success">Start Scan</button>
  </form>
{% endblock %}
