version: '3.8'

services:
  # Redis for Celery task queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main application with clang bundled
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-dev-secret-key-change-in-production}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - SCANS_DIR=/app/scans
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./scans:/app/scans
      - ./logs:/app/logs
      - ./templates:/app/templates
      - ./src:/app/src
      - ./app.py:/app/app.py
      - ./ai_patch_generator.py:/app/ai_patch_generator.py
      - ./search_cve_faiss.py:/app/search_cve_faiss.py
      - ./faiss_indexes:/app/faiss_indexes
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery worker for background tasks
  celery:
    build: .
    command: python celery_worker.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SCANS_DIR=/app/scans
    volumes:
      - ./scans:/app/scans
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  redis-data:
